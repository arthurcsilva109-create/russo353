<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZYPY — Game Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B00;
    --orange-bright: #FF8C00;
    --orange-glow: #FFa500;
    --orange-deep: #cc4e00;
    --black: #050505;
    --dark: #0a0a0a;
    --dark2: #111111;
    --dark3: #1a1a1a;
    --white: #fff;
    --gray: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    cursor: none;
  }

  /* ============ CUSTOM CURSOR ============ */
  #cursor {
    width: 20px; height: 20px;
    border: 2px solid var(--orange);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 99999;
    transition: transform 0.1s ease, background 0.2s;
    mix-blend-mode: difference;
  }
  #cursor-dot {
    width: 5px; height: 5px;
    background: var(--orange-bright);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 99999;
    transition: all 0.05s;
  }

  /* ============ SNOW ============ */
  #snow-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* ============ MARIO CANVAS ============ */
  #mario-canvas {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%;
    height: 180px;
    pointer-events: none;
    z-index: 5;
  }

  /* ============ SCANLINES ============ */
  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 20;
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove {
    0% { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  /* ============ GRID BG ============ */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,107,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 1;
    animation: gridPulse 4s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ============ PARTICLES ============ */
  .particle {
    position: fixed;
    width: 3px; height: 3px;
    background: var(--orange);
    border-radius: 50%;
    pointer-events: none;
    z-index: 8;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ============ WRAPPER ============ */
  .wrapper {
    position: relative;
    z-index: 30;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 220px;
  }

  /* ============ HEADER ============ */
  .header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeInDown 1s ease both;
  }

  .logo-wrap {
    position: relative;
    display: inline-block;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(3rem, 10vw, 7rem);
    font-weight: 900;
    color: var(--orange);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    position: relative;
    text-shadow:
      0 0 20px var(--orange),
      0 0 40px var(--orange-glow),
      0 0 80px rgba(255,107,0,0.4);
    animation: logoFlicker 3s ease-in-out infinite, logoScale 6s ease-in-out infinite;
  }

  @keyframes logoFlicker {
    0%,94%,96%,100% { opacity: 1; }
    95% { opacity: 0.7; }
  }
  @keyframes logoScale {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .logo::before {
    content: 'ZYPY';
    position: absolute;
    inset: 0;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,107,0,0.3);
    animation: glitch1 5s infinite;
  }
  .logo::after {
    content: 'ZYPY';
    position: absolute;
    inset: 0;
    color: rgba(0,255,255,0.1);
    animation: glitch2 5s infinite;
  }
  @keyframes glitch1 {
    0%,90%,100% { clip-path: none; transform: none; }
    91% { clip-path: inset(10% 0 60% 0); transform: translate(-3px, 0); }
    93% { clip-path: inset(50% 0 20% 0); transform: translate(3px, 0); }
    95% { clip-path: none; }
  }
  @keyframes glitch2 {
    0%,88%,100% { clip-path: none; transform: none; }
    89% { clip-path: inset(30% 0 40% 0); transform: translate(3px, -2px); }
    91% { clip-path: inset(70% 0 10% 0); transform: translate(-3px, 2px); }
    93% { clip-path: none; }
  }

  .logo-sub {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.4rem, 1.5vw, 0.7rem);
    color: var(--orange-bright);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-top: 10px;
    opacity: 0.8;
    animation: blink 1.5s step-end infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 0.8; }
    50% { opacity: 0.3; }
  }

  .header-badges {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.45rem;
    padding: 6px 14px;
    border: 1px solid var(--orange);
    color: var(--orange);
    background: rgba(255,107,0,0.05);
    letter-spacing: 0.1em;
    position: relative;
    overflow: hidden;
    animation: badgePulse 2s ease-in-out infinite;
  }
  .badge:nth-child(2) { animation-delay: 0.3s; }
  .badge:nth-child(3) { animation-delay: 0.6s; }
  @keyframes badgePulse {
    0%,100% { box-shadow: 0 0 5px rgba(255,107,0,0.3); }
    50% { box-shadow: 0 0 15px rgba(255,107,0,0.7), inset 0 0 10px rgba(255,107,0,0.1); }
  }
  .badge::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(transparent, rgba(255,107,0,0.1), transparent);
    animation: badgeSweep 3s linear infinite;
  }
  @keyframes badgeSweep {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============ MAIN CARD ============ */
  .main-card {
    width: 100%;
    max-width: 700px;
    background: rgba(10,10,10,0.9);
    border: 1px solid rgba(255,107,0,0.3);
    border-radius: 4px;
    padding: 40px;
    position: relative;
    overflow: hidden;
    animation: fadeInUp 1s 0.4s ease both, cardGlow 4s ease-in-out infinite;
    backdrop-filter: blur(10px);
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardGlow {
    0%,100% { box-shadow: 0 0 20px rgba(255,107,0,0.1), inset 0 0 20px rgba(255,107,0,0.02); }
    50% { box-shadow: 0 0 40px rgba(255,107,0,0.25), inset 0 0 30px rgba(255,107,0,0.05); }
  }

  .card-corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--orange);
    border-style: solid;
  }
  .card-corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .card-corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .card-corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .card-corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  .card-scan {
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,107,0,0.04), transparent);
    animation: scanCard 4s linear infinite;
  }
  @keyframes scanCard {
    0% { left: -100%; }
    100% { left: 200%; }
  }

  .section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.6rem;
    color: var(--orange);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,107,0,0.2);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '▶';
    animation: arrowBlink 1s step-end infinite;
  }
  @keyframes arrowBlink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ============ INPUT AREA ============ */
  .input-group {
    margin-bottom: 28px;
    position: relative;
  }
  .input-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.45rem;
    color: var(--gray);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
    transition: color 0.3s;
  }
  .input-group:focus-within .input-label { color: var(--orange); }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .input-icon {
    position: absolute;
    left: 16px;
    font-size: 1.1rem;
    z-index: 2;
    pointer-events: none;
    transition: all 0.3s;
  }
  .game-input {
    width: 100%;
    background: rgba(255,107,0,0.04);
    border: 1px solid rgba(255,107,0,0.25);
    border-radius: 3px;
    padding: 16px 16px 16px 48px;
    color: var(--white);
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    outline: none;
    transition: all 0.3s;
    caret-color: var(--orange);
  }
  .game-input::placeholder {
    color: rgba(255,107,0,0.25);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
  }
  .game-input:focus {
    border-color: var(--orange);
    background: rgba(255,107,0,0.06);
    box-shadow: 0 0 0 2px rgba(255,107,0,0.15), 0 0 20px rgba(255,107,0,0.1);
  }
  .game-input:focus + .input-glow { opacity: 1; }
  .input-glow {
    position: absolute;
    inset: -1px;
    border-radius: 3px;
    background: transparent;
    box-shadow: 0 0 30px rgba(255,107,0,0.15);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  /* Tag IDs */
  .tags-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 36px;
    margin-top: 12px;
  }
  .tag {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,107,0,0.1);
    border: 1px solid rgba(255,107,0,0.4);
    border-radius: 3px;
    padding: 5px 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--orange-bright);
    animation: tagIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tag:hover {
    background: rgba(255,107,0,0.2);
    box-shadow: 0 0 10px rgba(255,107,0,0.3);
    transform: scale(1.05);
  }
  .tag .remove {
    font-size: 0.8rem;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .tag:hover .remove { opacity: 1; color: #ff4444; }
  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.5) rotate(-5deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }

  /* ============ BUTTONS ============ */
  .btn-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 140px;
    padding: 16px 24px;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn-primary {
    background: var(--orange);
    color: var(--black);
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.4s;
  }
  .btn-primary:hover::before { left: 100%; }
  .btn-primary:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 30px rgba(255,107,0,0.5), 0 0 0 2px rgba(255,107,0,0.3);
  }
  .btn-primary:active { transform: translateY(1px) scale(0.98); }

  .btn-secondary {
    background: transparent;
    color: var(--orange);
    border: 1px solid rgba(255,107,0,0.4);
  }
  .btn-secondary:hover {
    background: rgba(255,107,0,0.08);
    border-color: var(--orange);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(255,107,0,0.2);
  }
  .btn-secondary:active { transform: translateY(1px); }

  .btn-ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: scale(0);
    animation: ripple 0.6s linear;
    pointer-events: none;
  }
  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }

  /* ============ STATS BAR ============ */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 30px;
    animation: fadeInUp 1s 0.8s ease both;
  }
  .stat-box {
    background: rgba(10,10,10,0.8);
    border: 1px solid rgba(255,107,0,0.15);
    border-radius: 4px;
    padding: 20px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }
  .stat-box:hover {
    border-color: rgba(255,107,0,0.5);
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(255,107,0,0.15);
  }
  .stat-box::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--orange);
    animation: statLine 3s ease-in-out infinite;
  }
  .stat-box:nth-child(1)::after { animation-delay: 0s; }
  .stat-box:nth-child(2)::after { animation-delay: 1s; }
  .stat-box:nth-child(3)::after { animation-delay: 2s; }
  @keyframes statLine {
    0% { width: 0; opacity: 0; }
    50% { width: 100%; opacity: 1; }
    100% { width: 0; opacity: 0; }
  }
  .stat-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--orange);
    text-shadow: 0 0 20px rgba(255,107,0,0.5);
    display: block;
    animation: countUp 1s ease both;
  }
  .stat-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.38rem;
    color: var(--gray);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
    display: block;
  }

  /* ============ RECENT IDS LIST ============ */
  .recent-section {
    width: 100%;
    max-width: 700px;
    margin-top: 24px;
    animation: fadeInUp 1s 1s ease both;
  }
  .recent-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    color: rgba(255,107,0,0.5);
    letter-spacing: 0.3em;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .recent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }
  .recent-item {
    background: rgba(10,10,10,0.7);
    border: 1px solid rgba(255,107,0,0.1);
    border-radius: 3px;
    padding: 12px;
    text-align: center;
    transition: all 0.3s;
    cursor: none;
    animation: fadeInUp 0.5s ease both;
  }
  .recent-item:hover {
    border-color: rgba(255,107,0,0.4);
    background: rgba(255,107,0,0.05);
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 6px 20px rgba(255,107,0,0.15);
  }
  .recent-id {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--orange-bright);
    display: block;
    margin-bottom: 4px;
  }
  .recent-time {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.3rem;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.1em;
  }

  /* ============ TOAST ============ */
  .toast {
    position: fixed;
    top: 30px;
    right: 30px;
    background: var(--dark2);
    border: 1px solid var(--orange);
    border-radius: 4px;
    padding: 16px 24px;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    color: var(--orange);
    letter-spacing: 0.1em;
    z-index: 9999;
    transform: translateX(200%);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 30px rgba(255,107,0,0.3);
  }
  .toast.show { transform: translateX(0); }

  /* ============ MARIO GROUND ============ */
  .ground-bar {
    position: fixed;
    bottom: 165px;
    left: 0;
    width: 100%;
    height: 2px;
    background: repeating-linear-gradient(90deg, var(--orange) 0, var(--orange) 20px, transparent 20px, transparent 40px);
    opacity: 0.3;
    z-index: 6;
  }

  /* ============ LOADING OVERLAY ============ */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--black);
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    animation: loadingHide 0.5s 2.5s ease both;
  }
  @keyframes loadingHide {
    to { opacity: 0; pointer-events: none; }
  }
  .loading-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 3rem;
    font-weight: 900;
    color: var(--orange);
    animation: loadingPulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes loadingPulse {
    from { text-shadow: 0 0 20px var(--orange); }
    to { text-shadow: 0 0 60px var(--orange), 0 0 100px var(--orange-glow); }
  }
  .loading-bar-wrap {
    width: 300px;
    height: 4px;
    background: rgba(255,107,0,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar {
    height: 100%;
    background: var(--orange);
    border-radius: 2px;
    animation: loadBar 2.2s ease both;
    box-shadow: 0 0 10px var(--orange);
  }
  @keyframes loadBar {
    from { width: 0; }
    to { width: 100%; }
  }
  .loading-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    color: rgba(255,107,0,0.6);
    letter-spacing: 0.3em;
    animation: blink 0.8s step-end infinite;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 600px) {
    .main-card { padding: 24px 18px; }
    .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-num { font-size: 1.3rem; }
    .stat-label { font-size: 0.28rem; }
    .btn-row { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <div class="loading-logo">ZYPY</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-text">INICIALIZANDO SISTEMA...</div>
</div>

<!-- CURSOR -->
<div id="cursor"></div>
<div id="cursor-dot"></div>

<!-- BACKGROUND EFFECTS -->
<div class="grid-bg"></div>
<div class="scanlines"></div>
<canvas id="snow-canvas"></canvas>
<canvas id="mario-canvas"></canvas>
<div class="ground-bar"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MAIN CONTENT -->
<div class="wrapper">
  <header class="header">
    <div class="logo-wrap">
      <div class="logo">ZYPY</div>
    </div>
    <div class="logo-sub">// GAME ID HUB v2.0 //</div>
    <div class="header-badges">
      <div class="badge">🎮 ONLINE</div>
      <div class="badge">⚡ FAST</div>
      <div class="badge">🔥 PREMIUM</div>
    </div>
  </header>

  <div class="main-card">
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>
    <div class="card-scan"></div>

    <div class="section-title">INSERIR ID DE JOGOS</div>

    <div class="input-group">
      <label class="input-label" for="game-id-input">ID DO JOGO</label>
      <div class="input-wrap">
        <span class="input-icon">🎮</span>
        <input
          class="game-input"
          id="game-id-input"
          type="text"
          placeholder="EX: 483920 · 771024 · ..."
          autocomplete="off"
        />
        <div class="input-glow"></div>
      </div>
      <div class="tags-wrap" id="tags-wrap"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btn-add" onclick="addId()">
        ▶ ADICIONAR ID
      </button>
      <button class="btn btn-secondary" id="btn-search" onclick="searchIds()">
        ⟳ BUSCAR
      </button>
      <button class="btn btn-secondary" id="btn-clear" onclick="clearAll()">
        ✕ LIMPAR
      </button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box">
      <span class="stat-num" id="stat-total">0</span>
      <span class="stat-label">IDs Adicionados</span>
    </div>
    <div class="stat-box">
      <span class="stat-num" id="stat-searches">0</span>
      <span class="stat-label">Buscas</span>
    </div>
    <div class="stat-box">
      <span class="stat-num" id="stat-session">00:00</span>
      <span class="stat-label">Sessão</span>
    </div>
  </div>

  <div class="recent-section" id="recent-section" style="display:none;">
    <div class="recent-title">// HISTÓRICO RECENTE //</div>
    <div class="recent-grid" id="recent-grid"></div>
  </div>
</div>

<script>
/* ============ CURSOR ============ */
const cur = document.getElementById('cursor');
const dot = document.getElementById('cursor-dot');
document.addEventListener('mousemove', e => {
  cur.style.left = (e.clientX - 10) + 'px';
  cur.style.top = (e.clientY - 10) + 'px';
  dot.style.left = (e.clientX - 2.5) + 'px';
  dot.style.top = (e.clientY - 2.5) + 'px';
});
document.addEventListener('mousedown', () => {
  cur.style.transform = 'scale(0.6)';
  cur.style.background = 'rgba(255,107,0,0.3)';
});
document.addEventListener('mouseup', () => {
  cur.style.transform = 'scale(1)';
  cur.style.background = 'transparent';
});

/* ============ RIPPLE on buttons ============ */
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', function(e) {
    const r = document.createElement('span');
    r.className = 'btn-ripple';
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height) * 2;
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
    this.appendChild(r);
    setTimeout(() => r.remove(), 700);
  });
});

/* ============ SNOW ============ */
const snowCanvas = document.getElementById('snow-canvas');
const sCtx = snowCanvas.getContext('2d');
let snowflakes = [];
function resizeSnow() {
  snowCanvas.width = window.innerWidth;
  snowCanvas.height = window.innerHeight;
}
resizeSnow();
window.addEventListener('resize', resizeSnow);

for (let i = 0; i < 120; i++) {
  snowflakes.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 3 + 0.5,
    speed: Math.random() * 1.5 + 0.3,
    drift: (Math.random() - 0.5) * 0.5,
    opacity: Math.random() * 0.5 + 0.1,
    twinkle: Math.random() * Math.PI * 2
  });
}

function animateSnow() {
  sCtx.clearRect(0, 0, snowCanvas.width, snowCanvas.height);
  snowflakes.forEach(f => {
    f.twinkle += 0.05;
    const opacity = f.opacity * (0.7 + 0.3 * Math.sin(f.twinkle));
    sCtx.beginPath();
    sCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(255, 200, 130, ${opacity})`;
    sCtx.fill();
    f.y += f.speed;
    f.x += f.drift;
    if (f.y > snowCanvas.height + 10) {
      f.y = -10;
      f.x = Math.random() * snowCanvas.width;
    }
    if (f.x > snowCanvas.width + 10) f.x = -10;
    if (f.x < -10) f.x = snowCanvas.width + 10;
  });
  requestAnimationFrame(animateSnow);
}
animateSnow();

/* ============ PARTICLES ============ */
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left: ${Math.random() * 100}%;
    width: ${Math.random() * 4 + 1}px;
    height: ${Math.random() * 4 + 1}px;
    animation-duration: ${Math.random() * 12 + 8}s;
    animation-delay: ${Math.random() * 10}s;
    opacity: ${Math.random() * 0.6 + 0.2};
  `;
  document.body.appendChild(p);
}

/* ============ MARIO PIXEL ART RUNNER ============ */
const mc = document.getElementById('mario-canvas');
const mCtx = mc.getContext('2d');
mc.width = window.innerWidth;
mc.height = 180;
window.addEventListener('resize', () => { mc.width = window.innerWidth; });

// Mario pixel art (16x16 grid, colors)
const O = null;
const R = '#e52222'; // red
const S = '#f5c27a'; // skin
const B = '#5c3d17'; // brown
const W = '#fff';
const Y = '#f5d000'; // yellow
const K = '#222'; // dark

const marioFrames = [
  // Frame 1 - walking
  [
    [O,O,O,R,R,R,R,R,O,O,O,O],
    [O,O,R,R,R,R,R,R,R,R,R,O],
    [O,O,B,B,B,S,S,B,S,O,O,O],
    [O,B,S,B,S,S,S,B,S,S,S,O],
    [O,B,S,B,B,S,S,S,B,S,S,B],
    [O,B,B,S,S,S,S,B,B,B,B,O],
    [O,O,O,S,S,S,S,S,S,O,O,O],
    [O,O,R,R,B,R,R,O,O,O,O,O],
    [O,R,R,R,B,R,R,R,O,O,O,O],
    [R,R,R,B,B,B,R,R,R,O,O,O],
    [S,S,B,B,O,B,B,S,S,O,O,O],
    [S,S,S,O,O,O,S,S,S,O,O,O],
    [B,B,O,O,O,O,O,B,B,O,O,O],
  ],
  // Frame 2 - walking
  [
    [O,O,O,R,R,R,R,R,O,O,O,O],
    [O,O,R,R,R,R,R,R,R,R,R,O],
    [O,O,B,B,B,S,S,B,S,O,O,O],
    [O,B,S,B,S,S,S,B,S,S,S,O],
    [O,B,S,B,B,S,S,S,B,S,S,B],
    [O,B,B,S,S,S,S,B,B,B,B,O],
    [O,O,O,S,S,S,S,S,S,O,O,O],
    [O,O,R,R,B,R,R,O,O,O,O,O],
    [O,R,R,R,B,R,R,R,O,O,O,O],
    [R,R,R,B,B,B,R,R,R,O,O,O],
    [O,S,B,B,O,O,B,B,O,O,O,O],
    [O,S,S,O,O,O,O,S,S,O,O,O],
    [O,O,B,B,O,O,B,B,O,O,O,O],
  ],
];

const coinArt = [
  [O,Y,Y,Y,O],
  [Y,Y,Y,Y,Y],
  [Y,W,Y,Y,Y],
  [Y,Y,Y,Y,Y],
  [O,Y,Y,Y,O],
];

const pipeArt = [
  [K,'#2b8a2e','#2b8a2e','#2b8a2e','#2b8a2e',K],
  ['#2b8a2e','#3dbd41','#3dbd41','#3dbd41','#2b8a2e',K],
  [K,'#2b8a2e','#2b8a2e','#2b8a2e','#2b8a2e',K],
  [K,'#2b8a2e','#2b8a2e','#2b8a2e','#2b8a2e',K],
  [K,'#2b8a2e','#2b8a2e','#2b8a2e','#2b8a2e',K],
  [K,'#2b8a2e','#2b8a2e','#2b8a2e','#2b8a2e',K],
  [K,'#2b8a2e','#2b8a2e','#2b8a2e','#2b8a2e',K],
  [K,'#2b8a2e','#2b8a2e','#2b8a2e','#2b8a2e',K],
];

const blockArt = [
  [Y,'#c8a000',Y,Y,Y,Y,'#c8a000',Y],
  ['#c8a000','#e8b000','#e8b000','#e8b000','#e8b000','#e8b000','#e8b000','#c8a000'],
  [Y,'#e8b000',W,Y,Y,Y,'#e8b000',Y],
  [Y,'#e8b000',Y,Y,Y,Y,'#e8b000',Y],
  [Y,'#e8b000',Y,Y,Y,Y,'#e8b000',Y],
  ['#c8a000','#e8b000','#e8b000','#e8b000','#e8b000','#e8b000','#e8b000','#c8a000'],
  [Y,'#c8a000',Y,Y,Y,Y,'#c8a000',Y],
];

function drawPixelArt(ctx, art, x, y, scale) {
  art.forEach((row, ry) => {
    row.forEach((color, cx) => {
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(x + cx * scale, y + ry * scale, scale, scale);
      }
    });
  });
}

let marioX = -80;
let marioFrame = 0;
let frameCount = 0;
let coinX = window.innerWidth + 100;
let coinBob = 0;
let pipes = [window.innerWidth + 300, window.innerWidth + 700];
let blocks = [window.innerWidth + 150, window.innerWidth + 500, window.innerWidth + 850];
const SCALE = 4;
const GROUND = mc.height - 2;
const MARIO_H = marioFrames[0].length * SCALE;

function drawMarioScene() {
  mCtx.clearRect(0, 0, mc.width, mc.height);

  // Ground
  mCtx.fillStyle = 'rgba(255,107,0,0.08)';
  mCtx.fillRect(0, GROUND - 2, mc.width, 2);

  // Stars
  for (let i = 0; i < 20; i++) {
    const sx = (i * 137 + frameCount * 0.3) % mc.width;
    const sy = (i * 53) % (mc.height - 40);
    mCtx.fillStyle = `rgba(255,200,100,${0.1 + Math.sin(frameCount * 0.05 + i) * 0.1})`;
    mCtx.fillRect(sx, sy, 2, 2);
  }

  // Blocks
  blocks.forEach(bx => {
    drawPixelArt(mCtx, blockArt, bx, GROUND - 80, 3);
  });

  // Pipes
  pipes.forEach(px => {
    drawPixelArt(mCtx, pipeArt, px, GROUND - pipeArt.length * 4, 4);
  });

  // Coin
  coinBob += 0.12;
  const coinY = GROUND - 100 + Math.sin(coinBob) * 8;
  drawPixelArt(mCtx, coinArt, coinX, coinY, 4);

  // Mario
  frameCount++;
  if (frameCount % 10 === 0) marioFrame = (marioFrame + 1) % 2;
  drawPixelArt(mCtx, marioFrames[marioFrame], marioX, GROUND - MARIO_H, SCALE);

  // Move everything
  marioX += 3;
  coinX -= 2;
  for (let i = 0; i < pipes.length; i++) pipes[i] -= 2;
  for (let i = 0; i < blocks.length; i++) blocks[i] -= 2;

  if (marioX > mc.width + 80) marioX = -80;
  if (coinX < -40) coinX = mc.width + 100;
  pipes = pipes.map(p => p < -50 ? mc.width + Math.random() * 400 + 300 : p);
  blocks = blocks.map(b => b < -50 ? mc.width + Math.random() * 500 + 200 : b);

  requestAnimationFrame(drawMarioScene);
}
drawMarioScene();

/* ============ APP STATE ============ */
let ids = [];
let searchCount = 0;
let recentHistory = [];
let sessionStart = Date.now();

// Session timer
setInterval(() => {
  const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('stat-session').textContent = `${m}:${s}`;
}, 1000);

function updateStats() {
  document.getElementById('stat-total').textContent = ids.length;
  document.getElementById('stat-searches').textContent = searchCount;
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function renderTags() {
  const wrap = document.getElementById('tags-wrap');
  wrap.innerHTML = '';
  ids.forEach((id, idx) => {
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.innerHTML = `${id} <span class="remove" onclick="removeId(${idx})">✕</span>`;
    wrap.appendChild(tag);
  });
}

function addId() {
  const input = document.getElementById('game-id-input');
  const val = input.value.trim().replace(/\s+/g, '');
  if (!val) { showToast('⚠ INSIRA UM ID VÁLIDO!'); return; }
  if (ids.includes(val)) { showToast('⚠ ID JÁ ADICIONADO!'); return; }
  ids.push(val);
  input.value = '';
  renderTags();
  updateStats();
  showToast(`✓ ID ${val} ADICIONADO!`);
}

function removeId(idx) {
  ids.splice(idx, 1);
  renderTags();
  updateStats();
  showToast('✓ ID REMOVIDO!');
}

function searchIds() {
  if (ids.length === 0) { showToast('⚠ ADICIONE IDs PRIMEIRO!'); return; }
  searchCount++;
  updateStats();

  // Add to history
  const now = new Date();
  const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  ids.forEach(id => {
    if (!recentHistory.find(h => h.id === id)) {
      recentHistory.unshift({ id, time: timeStr });
    }
  });
  recentHistory = recentHistory.slice(0, 12);
  renderHistory();
  showToast(`⟳ BUSCANDO ${ids.length} ID(s)...`, 3000);
}

function clearAll() {
  ids = [];
  renderTags();
  updateStats();
  showToast('✓ LISTA LIMPA!');
}

function renderHistory() {
  const sec = document.getElementById('recent-section');
  const grid = document.getElementById('recent-grid');
  if (recentHistory.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  grid.innerHTML = '';
  recentHistory.forEach((h, i) => {
    const item = document.createElement('div');
    item.className = 'recent-item';
    item.style.animationDelay = (i * 0.05) + 's';
    item.innerHTML = `<span class="recent-id">${h.id}</span><span class="recent-time">${h.time}</span>`;
    grid.appendChild(item);
  });
}

// Enter key support
document.getElementById('game-id-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addId();
});

// Animate stat numbers nicely
function animateNum(el, target) {
  let cur = parseInt(el.textContent) || 0;
  const diff = target - cur;
  const steps = 20;
  let step = 0;
  const interval = setInterval(() => {
    step++;
    el.textContent = Math.round(cur + diff * (step / steps));
    if (step >= steps) clearInterval(interval);
  }, 16);
}
</script>
